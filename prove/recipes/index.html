<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook | Home Page">
    <meta property="og:description" content="A gathering place of all my favorite recipes">
    <meta property="og:url" content="http://www.mattcraft900.github.io/WDD131/prove/recipes/index.html">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>

</head>

<body>
    <header>
        <div id="header-items">
            <img id="recipe-book-logo" src="images/recipe-book.png" alt="RecipeBook icon">
            <h1 id="title">RecipeBook</h1>
        </div>
    </header>
    <main>
        <form action="" id="search-form">
            <div id="search-bar">
                <input type="search" name="search" id="search" placeholder="Find a recipe">
                <button type="submit" id="search-button"><img src="images/search.svg"></button>
            </div>
        </form>
        <hr id="line">
        <div id="recipe-list">
            <!-- Code injected by live server (main.js) -->
        </div>
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </footer>
</body>

</html>
