<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Matthew Hilton">
    <title>Event Form</title>
    <link rel="shortcut icon" href="icons/ticket.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js" defer></script>
</head>

<body>
    <main>
        <h1 id="title">Event Ticket</h1>
        <form id="event-form">
            <div class="field text-input-field">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="firstName" required>
            </div>

            <div class="field text-input-field">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="lastName" required>
            </div>

            <div class="field text-input-field full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="field dropdown-field">
                <label for="travelRange">Type</label>
                <select id="ticket-type" name="ticketType" required>
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field date-field">
                <label for="event-date">Event Date</label>
                <input type="date" id="event-date" name="eventDate" required>
            </div>

            <div id="code-field" class="field text-input-field full" hidden>
                <label for="code"></label>
                <input type="text" id="code" name="code">
            </div>

            <button id="submit-button" class="full" type="submit">Create Ticket</button>

        </form>

        <div id="output"></div>
    </main>
</body>

</html>
