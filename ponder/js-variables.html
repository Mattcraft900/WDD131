        // Variables
        // "let" functions [kind of] the same as "var" but is more industry standard nowadays
        // "let" honors the variable scope upon creation, when "var" doesn't always
        // Use camel case for variable names (nameOfTheVariable)
        let myAge = 25;
        let myName = "Matthew"
        // No keywords when re-assigning a variable
        myName = "Matthew Hilton";
        myAge = myAge + 1; // etc.

        console.log(myAge) // This works the same as print() in python

        myAge = "Twenty-five" // JS variables are NOT type-specific
        console.log(myAge)
