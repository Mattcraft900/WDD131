<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="favicons/favicon.svg" />
    <link rel="manifest" href="favicons/site.webmanifest" />

    <title>Deathless | Character Bio page</title>

    <link rel="stylesheet" href="styles/character-bio.css">
    <script type="module" src="js/character-bio.js" defer></script>
    <script type="module" src="js/header.js" defer></script>
</head>
<body>
    <header>
        <!-- Header inserted by live server (header.js) -->
    </header>
    <main>
        <!-- Name -->
        <h1 id="character-name"></h1>
        
        <!-- Image -->
        <img src="#" alt="Image of the character" id="character-img">
        <hr>

        <section id="stats-section">
            <h2 id="stats-heading" class="section-heading">Character Stats</h2>
            
            <div id="stats-list">

                <!-- Full Name -->
                <div class="stat-div">
                    <label for="full-name" class="stat-name">Full Name: </label>
                    <p id="full-name" class="stat-value"></p>
                </div>

                <!-- Age -->
                <div class="stat-div">
                    <label for="age" class="stat-name">Age: </label>
                    <p id="age" class="stat-value"></p>
                </div>

                <!-- Species -->
                <div class="stat-div">
                    <label for="species" class="stat-name">Species: </label>
                    <p id="species" class="stat-value"></p>
                </div>

                <!-- Gender -->
                <div class="stat-div">
                    <label for="gender" class="stat-name">Gender: </label>
                    <p id="gender" class="stat-value"></p>
                </div>

                <!-- If party, include: classes & level, player name -->
                <!-- If OPC, include: original player name -->
                </div>
        </section>
        <hr>

        <!-- Description section -->
        <section id="description-section">
            <h2 id="description-heading" class="section-heading">Lucy's Notes:</h2>
            <!-- Formatting selection -->
            <div id="dropdown-div">
                <label for="format-dropdown">Formatting:</label>
                <select name="desc-format" id="format-dropdown" class="dropdown">
                    <option value="simple">Simple</option>
                    <option value="stylized" selected>Stylized</option>
                </select>
            </div>
            <div id="character-description">
                <!-- Content inserted by live server (character-bio.js) -->
            </div>
        </section>
        <hr>
    </main>
</body>
</html>
